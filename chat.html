<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>秦彻 - AI陪伴</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 800px;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      border-radius: 12px;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
      color: #e8d5b7;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a96e, #8b6914);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      font-weight: bold;
    }

    .header-info h3 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .header-info .status {
      font-size: 12px;
      color: #8bc34a;
      margin-top: 2px;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 8px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .message.assistant .msg-avatar {
      background: linear-gradient(135deg, #c9a96e, #8b6914);
      color: #fff;
    }

    .message.user .msg-avatar {
      background: #07c160;
      color: #fff;
    }

    .msg-content {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.assistant .msg-content {
      background: #fff;
      color: #333;
      border-top-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .message.user .msg-content {
      background: #07c160;
      color: #fff;
      border-top-right-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #fff;
      border-radius: 18px;
      border-top-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      align-self: flex-start;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: #999;
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .chat-input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input-area textarea {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      min-height: 40px;
      max-height: 100px;
    }

    .chat-input-area textarea:focus {
      border-color: #c9a96e;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #c9a96e, #8b6914);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .welcome-msg {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 13px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">秦</div>
    <div class="header-info">
      <h3>秦彻</h3>
      <div class="status">● 在线</div>
    </div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="welcome-msg">
      —— 秦彻 AI 陪伴 ——<br>
      输入消息开始聊天，秦彻会记住你们的对话 ✦
    </div>
    <div class="message assistant" id="intro-msg" style="display:none">
      <div class="msg-avatar">秦</div>
      <div class="msg-content" id="intro-text"></div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="input" placeholder="说点什么..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
const API_URL = 'https://wechat-ai-bot-sigma.vercel.app/v1/chat/completions';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

let conversationHistory = [];

// 自动调整输入框高度
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

// 回车发送，Shift+回车换行
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  // 显示用户消息
  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  // 显示"正在输入"
  const typingEl = appendTyping();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || '（好像没收到回复…）';

    // 移除"正在输入"
    typingEl.remove();

    // 显示AI回复
    appendMessage('assistant', reply);
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    typingEl.remove();
    appendMessage('assistant', '（网络好像有点问题，稍后再试试？）');
    console.error(err);
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function appendMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatarChar = role === 'assistant' ? '秦' : '我';
  const defaultAvatarBg = role === 'assistant'
    ? 'linear-gradient(135deg, #c9a96e, #8b6914)'
    : '#07c160';

  div.innerHTML = `
    <div class="msg-avatar" style="background:${defaultAvatarBg}">${avatarChar}</div>
    <div class="msg-content">${escapeHtml(content)}</div>
  `;

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function appendTyping() {
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/\n/g, '<br>');
}
</script>

</body>
</html>
